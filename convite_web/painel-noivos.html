<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel dos Noivos - Confirmações</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 2px solid #d4af37;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            color: #d4af37;
            margin-bottom: 10px;
        }

        .header p {
            color: #999;
            font-size: 1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(212, 175, 55, 0.05) 100%);
            border: 2px solid #d4af37;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
        }

        .stat-card i {
            font-size: 2.5rem;
            color: #d4af37;
            margin-bottom: 15px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(212, 175, 55, 0.2);
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #d4af37;
            color: #1a1a1a;
            transform: translateY(-2px);
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #d4af37;
            border-radius: 25px;
            background: rgba(212, 175, 55, 0.1);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
        }

        .search-box input::placeholder {
            color: #999;
        }

        .search-box input:focus {
            outline: none;
            background: rgba(212, 175, 55, 0.2);
        }

        .confirmacoes-list {
            background: rgba(26, 26, 26, 0.8);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .confirmacao-item {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .confirmacao-item:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: translateX(5px);
        }

        .confirmacao-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .confirmacao-nome {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            color: #d4af37;
            font-weight: 600;
        }

        .confirmacao-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .confirmacao-status.confirmado {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .confirmacao-status.nao-confirmado {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .confirmacao-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-item i {
            color: #d4af37;
            font-size: 1.1rem;
        }

        .detail-label {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            color: #fff;
            font-size: 0.95rem;
        }

        .confirmacao-mensagem {
            background: rgba(212, 175, 55, 0.1);
            border-left: 3px solid #d4af37;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }

        .mensagem-label {
            font-size: 0.75rem;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .mensagem-text {
            color: #ccc;
            font-style: italic;
            line-height: 1.6;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 4rem;
            color: #d4af37;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            color: #999;
            font-size: 1.1rem;
        }

        .export-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
            color: #1a1a1a;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .export-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(212, 175, 55, 0.6);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .confirmacao-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .confirmacao-details {
                grid-template-columns: 1fr;
            }

            .export-btn {
                bottom: 20px;
                right: 20px;
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-heart"></i> Painel dos Noivos</h1>
            <p>Confirmações de Presença - Laurinda & Douglas</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div class="stat-value" id="totalConfirmacoes">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <div class="stat-value" id="totalConfirmados">0</div>
                <div class="stat-label">Confirmados</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-times-circle"></i>
                <div class="stat-value" id="totalNaoConfirmados">0</div>
                <div class="stat-label">Não Confirmados</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-user-friends"></i>
                <div class="stat-value" id="totalPessoas">0</div>
                <div class="stat-label">Total de Pessoas</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filtrar('todos')">
                <i class="fas fa-list"></i> Todos
            </button>
            <button class="filter-btn" onclick="filtrar('confirmados')">
                <i class="fas fa-check"></i> Confirmados
            </button>
            <button class="filter-btn" onclick="filtrar('nao-confirmados')">
                <i class="fas fa-times"></i> Não Confirmados
            </button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Buscar por nome..." oninput="buscar()">
            </div>
        </div>

        <div class="confirmacoes-list" id="confirmacoesLista">
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>Carregando confirmações...</p>
            </div>
        </div>
    </div>

    <button class="export-btn" onclick="exportarCSV()">
        <i class="fas fa-download"></i>
        Exportar CSV
    </button>

    <script>
        let confirmacoes = [];
        let filtroAtual = 'todos';

        // Carregar confirmações do localStorage
       // Carregar confirmações
function carregarConfirmacoes() {
    const busca = document.getElementById('searchInput').value;
    const url = `buscar_confirmacoes.php?filtro=${filtroAtual}&busca=${encodeURIComponent(busca)}`;
    
    fetch(url)
        .then(response => {
            if (!response.ok) {
                throw new Error('Erro HTTP: ' + response.status);
            }
            return response.json();
        })
        .then(data => {
            if (data.success) {
                confirmacoes = data.confirmacoes;
                atualizarEstatisticas(data.estatisticas);
                renderizarConfirmacoes(confirmacoes);
            } else {
                throw new Error(data.message || 'Erro desconhecido');
            }
        })
        .catch(error => {
            console.error('Erro:', error);
            document.getElementById('confirmacoesLista').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Erro ao carregar confirmações</p>
                    <p style="color: #f44336; font-size: 0.9rem; margin-top: 10px;">${error.message}</p>
                    <button onclick="carregarConfirmacoes()" style="margin-top: 20px; padding: 10px 20px; background: #d4af37; color: #1a1a1a; border: none; border-radius: 25px; cursor: pointer; font-weight: 600;">
                        <i class="fas fa-sync"></i> Tentar Novamente
                    </button>
                </div>
            `;
        });
}

// Renderizar confirmações
function renderizarConfirmacoes(lista) {
    const container = document.getElementById('confirmacoesLista');

    if (!lista || lista.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>Nenhuma confirmação encontrada</p>
            </div>
        `;
        return;
    }

    let html = '';
    lista.forEach(confirmacao => {
        // Garantir que os valores existem
        const nome = confirmacao.nome || 'Sem nome';
        const telefone = confirmacao.telefone || '';
        const email = confirmacao.email || '';
        const presenca = confirmacao.presenca || '';
        const acompanhantes = parseInt(confirmacao.acompanhantes) || 0;
        const mensagem = confirmacao.mensagem || '';
        const data = confirmacao.data_confirmacao || '';

        const statusClass = presenca === 'sim' ? 'confirmado' : 'nao-confirmado';
        const statusText = presenca === 'sim' ? 'Confirmado' : presenca === 'nao' ? 'Não Confirmado' : 'Não informado';
        const statusIcon = presenca === 'sim' ? 'fa-check-circle' : 'fa-times-circle';

        const acompanhantesText = acompanhantes === 0 ? 'Sozinho' : 
                                 acompanhantes === 1 ? '1 acompanhante' : 
                                 `${acompanhantes} acompanhantes`;

        // Formatar telefone (remover prefixo sem_telefone)
        const telefoneFormatado = telefone.startsWith('sem_telefone') ? 'Não informado' : telefone;

        html += `
            <div class="confirmacao-item">
                <div class="confirmacao-header">
                    <div class="confirmacao-nome">${nome}</div>
                    ${presenca ? `
                    <div class="confirmacao-status ${statusClass}">
                        <i class="fas ${statusIcon}"></i>
                        ${statusText}
                    </div>
                    ` : ''}
                </div>
                <div class="confirmacao-details">
                    ${telefone && !telefone.startsWith('sem_telefone') ? `
                    <div class="detail-item">
                        <i class="fas fa-phone"></i>
                        <div class="detail-content">
                            <div class="detail-label">Telefone</div>
                            <div class="detail-value">${telefoneFormatado}</div>
                        </div>
                    </div>
                    ` : ''}
                    ${email ? `
                    <div class="detail-item">
                        <i class="fas fa-envelope"></i>
                        <div class="detail-content">
                            <div class="detail-label">Email</div>
                            <div class="detail-value">${email}</div>
                        </div>
                    </div>
                    ` : ''}
                    ${presenca === 'sim' ? `
                    <div class="detail-item">
                        <i class="fas fa-user-friends"></i>
                        <div class="detail-content">
                            <div class="detail-label">Acompanhantes</div>
                            <div class="detail-value">${acompanhantesText}</div>
                        </div>
                    </div>
                    ` : ''}
                    ${data ? `
                    <div class="detail-item">
                        <i class="fas fa-clock"></i>
                        <div class="detail-content">
                            <div class="detail-label">Data</div>
                            <div class="detail-value">${new Date(data).toLocaleString('pt-BR')}</div>
                        </div>
                    </div>
                    ` : ''}
                </div>
                ${mensagem ? `
                <div class="confirmacao-mensagem">
                    <div class="mensagem-label">💌 Mensagem</div>
                    <div class="mensagem-text">${mensagem}</div>
                </div>
                ` : ''}
            </div>
        `;
    });

    container.innerHTML = html;
}
        // Atualizar estatísticas
        function atualizarEstatisticas() {
            const totalConfirmacoes = confirmacoes.length;
            const totalConfirmados = confirmacoes.filter(c => c.presenca === 'sim').length;
            const totalNaoConfirmados = confirmacoes.filter(c => c.presenca === 'nao').length;
            
            let totalPessoas = 0;
            confirmacoes.forEach(c => {
                if (c.presenca === 'sim') {
                    totalPessoas += 1 + parseInt(c.acompanhantes || 0);
                }
            });

            document.getElementById('totalConfirmacoes').textContent = totalConfirmacoes;
            document.getElementById('totalConfirmados').textContent = totalConfirmados;
            document.getElementById('totalNaoConfirmados').textContent = totalNaoConfirmados;
            document.getElementById('totalPessoas').textContent = totalPessoas;
        }

        // Renderizar lista de confirmações
        function renderizarConfirmacoes(lista) {
    const container = document.getElementById('confirmacoesLista');

    if (!lista || lista.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>Nenhuma confirmação encontrada</p>
            </div>
        `;
        return;
    }

    let html = '';
    lista.forEach(confirmacao => {
        // Garantir que os valores existem
        const nome = confirmacao.nome || 'Sem nome';
        const telefone = confirmacao.telefone || '';
        const email = confirmacao.email || '';
        const presenca = confirmacao.presenca || '';
        const acompanhantes = parseInt(confirmacao.acompanhantes) || 0;
        const mensagem = confirmacao.mensagem || '';
        const data = confirmacao.data_confirmacao || '';

        const statusClass = presenca === 'sim' ? 'confirmado' : 'nao-confirmado';
        const statusText = presenca === 'sim' ? 'Confirmado' : presenca === 'nao' ? 'Não Confirmado' : 'Não informado';
        const statusIcon = presenca === 'sim' ? 'fa-check-circle' : 'fa-times-circle';

        const acompanhantesText = acompanhantes === 0 ? 'Sozinho' : 
                                 acompanhantes === 1 ? '1 acompanhante' : 
                                 `${acompanhantes} acompanhantes`;

        // Formatar telefone (remover prefixo sem_telefone)
        const telefoneFormatado = telefone.startsWith('sem_telefone') ? 'Não informado' : telefone;

        html += `
            <div class="confirmacao-item">
                <div class="confirmacao-header">
                    <div class="confirmacao-nome">${nome}</div>
                    ${presenca ? `
                    <div class="confirmacao-status ${statusClass}">
                        <i class="fas ${statusIcon}"></i>
                        ${statusText}
                    </div>
                    ` : ''}
                </div>
                <div class="confirmacao-details">
                    ${telefone && !telefone.startsWith('sem_telefone') ? `
                    <div class="detail-item">
                        <i class="fas fa-phone"></i>
                        <div class="detail-content">
                            <div class="detail-label">Telefone</div>
                            <div class="detail-value">${telefoneFormatado}</div>
                        </div>
                    </div>
                    ` : ''}
                    ${email ? `
                    <div class="detail-item">
                        <i class="fas fa-envelope"></i>
                        <div class="detail-content">
                            <div class="detail-label">Email</div>
                            <div class="detail-value">${email}</div>
                        </div>
                    </div>
                    ` : ''}
                    ${presenca === 'sim' ? `
                    <div class="detail-item">
                        <i class="fas fa-user-friends"></i>
                        <div class="detail-content">
                            <div class="detail-label">Acompanhantes</div>
                            <div class="detail-value">${acompanhantesText}</div>
                        </div>
                    </div>
                    ` : ''}
                    ${data ? `
                    <div class="detail-item">
                        <i class="fas fa-clock"></i>
                        <div class="detail-content">
                            <div class="detail-label">Data</div>
                            <div class="detail-value">${new Date(data).toLocaleString('pt-BR')}</div>
                        </div>
                    </div>
                    ` : ''}
                </div>
                ${mensagem ? `
                <div class="confirmacao-mensagem">
                    <div class="mensagem-label">💌 Mensagem</div>
                    <div class="mensagem-text">${mensagem}</div>
                </div>
                ` : ''}
            </div>
        `;
    });

    container.innerHTML = html;
}

        // Filtrar confirmações
        function filtrar(tipo) {
            filtroAtual = tipo;
            
            // Atualizar botões
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            aplicarFiltros();
        }

        // Buscar confirmações
        function buscar() {
            aplicarFiltros();
        }

        // Aplicar filtros
        function aplicarFiltros() {
            let listaFiltrada = [...confirmacoes];

            // Filtro por status
            if (filtroAtual === 'confirmados') {
                listaFiltrada = listaFiltrada.filter(c => c.presenca === 'sim');
            } else if (filtroAtual === 'nao-confirmados') {
                listaFiltrada = listaFiltrada.filter(c => c.presenca === 'nao');
            }

            // Filtro por busca
            const termoBusca = document.getElementById('searchInput').value.toLowerCase();
            if (termoBusca) {
                listaFiltrada = listaFiltrada.filter(c => 
                    c.nome.toLowerCase().includes(termoBusca) ||
                    c.telefone.includes(termoBusca) ||
                    (c.email && c.email.toLowerCase().includes(termoBusca))
                );
            }

            renderizarConfirmacoes(listaFiltrada);
        }

        // Exportar para CSV
        function exportarCSV() {
            if (confirmacoes.length === 0) {
                alert('Não há confirmações para exportar');
                return;
            }

            let csv = 'Nome,Telefone,Email,Presença,Acompanhantes,Mensagem,Data\n';
            
            confirmacoes.forEach(c => {
                const linha = [
                    `"${c.nome}"`,
                    `"${c.telefone}"`,
                    `"${c.email || ''}"`,
                    c.presenca === 'sim' ? 'Confirmado' : 'Não Confirmado',
                    c.acompanhantes || 0,
                    `"${c.mensagem || ''}"`,
                    `"${new Date(c.data).toLocaleString('pt-BR')}"`
                ].join(',');
                csv += linha + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', `confirmacoes_casamento_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Atualizar interface
        function atualizarInterface() {
            atualizarEstatisticas();
            aplicarFiltros();
        }

        // Auto-atualizar a cada 5 segundos
        setInterval(carregarConfirmacoes, 5000);

        // Carregar ao iniciar
        carregarConfirmacoes();
    </script>
</body>
</html>
